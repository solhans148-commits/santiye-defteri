    <script src="./bundle.js?v=3.1.0"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js", { updateViaCache: "none" })
            .then((reg) => reg.update().catch(() => {}))
            .catch(() => {});
        });
      }
    </script>
